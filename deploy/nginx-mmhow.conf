# Copy to VPS: /etc/nginx/sites-available/mmhow
# sudo ln -sf /etc/nginx/sites-available/mmhow /etc/nginx/sites-enabled/mmhow
# sudo rm -f /etc/nginx/sites-enabled/default
# sudo nginx -t && sudo systemctl reload nginx

upstream mmhow_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name mmhow.com www.mmhow.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://www.mmhow.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.mmhow.com;

    ssl_certificate /etc/letsencrypt/live/www.mmhow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.mmhow.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://mmhow_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mmhow.com;

    ssl_certificate /etc/letsencrypt/live/mmhow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mmhow.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.mmhow.com$request_uri;
}

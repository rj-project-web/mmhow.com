<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" fill="none" role="img" aria-label="Online income growth illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="640" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="chart" x1="120" y1="320" x2="520" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="640" height="480" rx="24" fill="url(#bg)"/>
  <!-- Card -->
  <g filter="url(#shadow)">
    <rect x="72" y="64" width="496" height="352" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <!-- Header bar -->
  <rect x="96" y="88" width="120" height="12" rx="6" fill="#2563EB" opacity="0.15"/>
  <rect x="96" y="88" width="72" height="12" rx="6" fill="#2563EB"/>
  <circle cx="520" cy="94" r="8" fill="#10B981" opacity="0.2"/>
  <circle cx="544" cy="94" r="8" fill="#2563EB" opacity="0.2"/>
  <!-- Stats pills -->
  <rect x="96" y="120" width="140" height="56" rx="12" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="116" y="142" fill="#64748B" font-family="system-ui,sans-serif" font-size="11" font-weight="600">MONTHLY INCOME</text>
  <text x="116" y="164" fill="#10B981" font-family="system-ui,sans-serif" font-size="22" font-weight="700">+$2,840</text>
  <rect x="252" y="120" width="140" height="56" rx="12" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="272" y="142" fill="#64748B" font-family="system-ui,sans-serif" font-size="11" font-weight="600">SIDE HUSTLES</text>
  <text x="272" y="164" fill="#2563EB" font-family="system-ui,sans-serif" font-size="22" font-weight="700">3 Active</text>
  <!-- Chart area -->
  <rect x="96" y="196" width="448" height="184" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="120" y1="340" x2="520" y2="340" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="120" y1="300" x2="520" y2="300" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="120" y1="260" x2="520" y2="260" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="120" y1="220" x2="520" y2="220" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Growth line -->
  <path d="M120 320 L200 300 L280 280 L360 240 L440 200 L520 160" stroke="url(#chart)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M120 320 L200 300 L280 280 L360 240 L440 200 L520 160 L520 340 L120 340 Z" fill="url(#chart)" opacity="0.12"/>
  <!-- Data points -->
  <circle cx="200" cy="300" r="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="3"/>
  <circle cx="280" cy="280" r="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="3"/>
  <circle cx="360" cy="240" r="6" fill="#FFFFFF" stroke="#10B981" stroke-width="3"/>
  <circle cx="440" cy="200" r="6" fill="#FFFFFF" stroke="#10B981" stroke-width="3"/>
  <circle cx="520" cy="160" r="8" fill="#10B981"/>
  <!-- Arrow up -->
  <path d="M528 152 L536 160 L528 168" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Laptop icon -->
  <rect x="480" y="108" width="48" height="32" rx="4" fill="#2563EB" opacity="0.9"/>
  <rect x="486" y="114" width="36" height="20" rx="2" fill="#EFF6FF"/>
  <path d="M472 144 H536 L544 148 H464 Z" fill="#1D4ED8"/>
  <!-- Dollar badge -->
  <circle cx="128" cy="220" r="28" fill="#10B981" opacity="0.15"/>
  <circle cx="128" cy="220" r="20" fill="#10B981"/>
  <text x="128" y="228" text-anchor="middle" fill="#FFFFFF" font-family="system-ui,sans-serif" font-size="22" font-weight="700">$</text>
</svg>

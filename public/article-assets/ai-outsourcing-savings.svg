<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" fill="none">
  <rect width="1200" height="520" rx="16" fill="#f9f9ff"/>
  <rect x="48" y="48" width="1104" height="424" rx="12" fill="#ffffff" stroke="#d8e3fb" stroke-width="2"/>
  <text x="600" y="108" text-anchor="middle" fill="#111c2d" font-family="Georgia, serif" font-size="30" font-weight="700">Monthly Cost: Outsourcing vs AI-Assisted Solo Work</text>
  <text x="600" y="140" text-anchor="middle" fill="#434750" font-family="system-ui, sans-serif" font-size="15">Illustrative example for a one-person content business</text>
  <text x="280" y="200" text-anchor="middle" fill="#434750" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Before (outsourced)</text>
  <rect x="120" y="220" width="80" height="180" rx="6" fill="#dee8ff"/>
  <rect x="220" y="260" width="80" height="140" rx="6" fill="#a6c8ff"/>
  <rect x="320" y="300" width="80" height="100" rx="6" fill="#335d94"/>
  <text x="160" y="418" text-anchor="middle" fill="#434750" font-family="system-ui, sans-serif" font-size="12">Copy $400</text>
  <text x="260" y="418" text-anchor="middle" fill="#434750" font-family="system-ui, sans-serif" font-size="12">Design $350</text>
  <text x="360" y="418" text-anchor="middle" fill="#434750" font-family="system-ui, sans-serif" font-size="12">VA $300</text>
  <text x="280" y="448" text-anchor="middle" fill="#111c2d" font-family="system-ui, sans-serif" font-size="18" font-weight="700">about $1,050/mo</text>
  <text x="920" y="200" text-anchor="middle" fill="#434750" font-family="system-ui, sans-serif" font-size="14" font-weight="600">After (AI + you)</text>
  <rect x="760" y="340" width="100" height="60" rx="6" fill="#335d94"/>
  <rect x="880" y="360" width="100" height="40" rx="6" fill="#a6c8ff"/>
  <text x="810" y="418" text-anchor="middle" fill="#434750" font-family="system-ui, sans-serif" font-size="12">AI tools $45</text>
  <text x="930" y="418" text-anchor="middle" fill="#434750" font-family="system-ui, sans-serif" font-size="12">Your time</text>
  <text x="920" y="448" text-anchor="middle" fill="#111c2d" font-family="system-ui, sans-serif" font-size="18" font-weight="700">about $45-80/mo tools</text>
  <path d="M480 300 L560 300" stroke="#335d94" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#335d94"/>
    </marker>
  </defs>
  <text x="520" y="288" text-anchor="middle" fill="#335d94" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Replace</text>
  <text x="600" y="492" text-anchor="middle" fill="#737781" font-family="system-ui, sans-serif" font-size="12">AI amplifies your output - it does not replace strategy, quality control, or client relationships.</text>
</svg>

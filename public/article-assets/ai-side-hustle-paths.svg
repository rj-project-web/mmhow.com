<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" fill="none">
  <rect width="1200" height="680" rx="16" fill="#f9f9ff"/>
  <rect x="48" y="48" width="1104" height="584" rx="12" fill="#ffffff" stroke="#d8e3fb" stroke-width="2"/>
  <text x="600" y="108" text-anchor="middle" fill="#111c2d" font-family="Georgia, serif" font-size="32" font-weight="700">7 AI Side Hustle Paths - Pick Your Starting Point</text>

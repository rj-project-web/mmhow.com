  <rect x="200" y="440" width="800" height="140" rx="10" fill="#f0f3ff" stroke="#c3c6d1"/>
  <text x="600" y="478" text-anchor="middle" fill="#335d94" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Quick decision guide</text>
  <text x="600" y="512" text-anchor="middle" fill="#434750" font-family="system-ui, sans-serif" font-size="14">Can you write clearly? - Path 1</text>
  <text x="600" y="538" text-anchor="middle" fill="#434750" font-family="system-ui, sans-serif" font-size="14">Comfortable on camera / video? - Path 2</text>
  <text x="600" y="564" text-anchor="middle" fill="#434750" font-family="system-ui, sans-serif" font-size="14">Technical or willing to learn setup? - Paths 3-4</text>

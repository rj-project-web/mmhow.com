  <g font-family="system-ui, sans-serif" font-size="14">
    <rect x="72" y="180" width="250" height="88" rx="8" fill="#e7eeff" stroke="#335d94"/>
    <text x="197" y="214" text-anchor="middle" fill="#111c2d" font-weight="600">1. AI Writing</text>
    <text x="197" y="238" text-anchor="middle" fill="#434750">$300-1,500/day - Lowest barrier</text>

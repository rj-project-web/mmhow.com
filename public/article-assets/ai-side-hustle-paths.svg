    <text x="477" y="238" text-anchor="middle" fill="#434750">$500-2,000/day - High demand</text>
    <rect x="632" y="180" width="250" height="88" rx="8" fill="#e7eeff" stroke="#335d94"/>
    <text x="757" y="214" text-anchor="middle" fill="#111c2d" font-weight="600">3. AI Setup Services</text>
    <text x="757" y="238" text-anchor="middle" fill="#434750">$500-1,500/day - Agent deploy</text>
    <rect x="912" y="180" width="216" height="88" rx="8" fill="#e7eeff" stroke="#335d94"/>

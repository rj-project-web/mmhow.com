    <text x="1020" y="238" text-anchor="middle" fill="#434750">$800-2,000/day</text>
    <rect x="212" y="310" width="250" height="88" rx="8" fill="#e7eeff" stroke="#335d94"/>
    <text x="337" y="344" text-anchor="middle" fill="#111c2d" font-weight="600">5. AI Design</text>
    <text x="337" y="368" text-anchor="middle" fill="#434750">$500-1,500/day - Visual work</text>
    <rect x="492" y="310" width="250" height="88" rx="8" fill="#e7eeff" stroke="#335d94"/>
    <text x="617" y="344" text-anchor="middle" fill="#111c2d" font-weight="600">6. AI Training</text>
    <text x="617" y="368" text-anchor="middle" fill="#434750">$1,000-5,000/day - Teach others</text>
    <rect x="772" y="310" width="250" height="88" rx="8" fill="#e7eeff" stroke="#335d94"/>
